<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F14"/>
      <stop offset="100%" style="stop-color:#121821"/>
    </linearGradient>
    <linearGradient id="q" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#q)" stroke-width="2.5" opacity="0.6"/>
  <!-- Letter Q -->
  <text x="32" y="44" font-family="'Segoe UI',Arial,sans-serif" font-size="38" font-weight="800" fill="url(#q)" text-anchor="middle" filter="url(#glow)">Q</text>
  <!-- Small accent dot (agent node) -->
  <circle cx="46" cy="18" r="3.5" fill="#22D3EE" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="48" r="2" fill="#10b981" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
