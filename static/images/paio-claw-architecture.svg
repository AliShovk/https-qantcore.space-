  <rect x="30" y="131" width="900" height="135" rx="12" fill="#1E1E30" stroke="#FF8C2A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="155" text-anchor="middle" fill="#FF8C2A" font-size="14" font-weight="800" letter-spacing="0.05em">PAIO HOSTING PLATFORM</text>

