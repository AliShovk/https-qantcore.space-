<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C2A"/>
      <stop offset="100%" stop-color="#E07000"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#FF8C2A"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#FBF9EC" font-size="22" font-weight="800" letter-spacing="-0.02em">Архитектура PaioClaw — Managed OpenClaw Agent Platform</text>

  <!-- ====== LAYER 1: USER ENTRY POINTS ====== -->
  <rect x="30" y="58" width="900" height="50" rx="8" fill="#1A1A2E" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="50" y="80" fill="#ACA994" font-size="11" text-anchor="start" font-weight="700">▸ КАНАЛЫ ВЗАИМОДЕЙСТВИЯ</text>

  <!-- Channel icons row -->
  <rect x="280" y="65" width="85" height="34" rx="6" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="322" y="86" text-anchor="middle" fill="#1A0A00" font-size="11" font-weight="700">Web App</text>

  <rect x="380" y="65" width="80" height="34" rx="6" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="420" y="86" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="600">Telegram</text>

  <rect x="475" y="65" width="70" height="34" rx="6" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="510" y="86" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="600">Discord</text>

  <rect x="560" y="65" width="60" height="34" rx="6" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="590" y="86" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="600">Slack</text>

  <rect x="635" y="65" width="75" height="34" rx="6" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="672" y="86" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="600">WhatsApp</text>

  <rect x="725" y="65" width="65" height="34" rx="6" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="757" y="86" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="600">Mac App</text>

