  <text x="95" y="515" text-anchor="middle" fill="#6B7280" font-size="9">200+ LLM Models</text>

  <rect x="175" y="468" width="130" height="65" rx="8" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="240" y="495" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="700">OpenAI</text>
  <text x="240" y="515" text-anchor="middle" fill="#6B7280" font-size="9">GPT-4o, o3, etc.</text>

  <rect x="320" y="468" width="130" height="65" rx="8" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="385" y="495" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="700">Supabase</text>
  <text x="385" y="515" text-anchor="middle" fill="#6B7280" font-size="9">DB + Realtime WS</text>

  <rect x="465" y="468" width="130" height="65" rx="8" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="530" y="495" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="700">Your API Keys</text>
  <text x="530" y="515" text-anchor="middle" fill="#6B7280" font-size="9">User-owned keys</text>

  <rect x="610" y="468" width="140" height="65" rx="8" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="680" y="495" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="700">GitHub / Gmail</text>
  <text x="680" y="515" text-anchor="middle" fill="#6B7280" font-size="9">Google Calendar</text>

  <rect x="765" y="468" width="140" height="65" rx="8" fill="#232340" stroke="#FFFFFF10" stroke-width="1"/>
  <text x="835" y="495" text-anchor="middle" fill="#E8E5DD" font-size="11" font-weight="700">HomeKit / MQTT</text>
  <text x="835" y="515" text-anchor="middle" fill="#6B7280" font-size="9">Smart Home</text>

  <!-- ====== KEY / PRICING at bottom ====== -->
  <rect x="30" y="548" width="900" height="58" rx="8" fill="#1A1A2E" stroke="#FFFFFF08" stroke-width="1"/>

  <rect x="50" y="560" width="16" height="16" rx="3" fill="url(#orangeGrad)"/>
  <text x="74" y="573" fill="#ACA994" font-size="10">PaioClaw — $19/мес</text>

  <rect x="210" y="560" width="16" height="16" rx="3" fill="#232340" stroke="#FFFFFF20" stroke-width="1"/>
  <text x="234" y="573" fill="#ACA994" font-size="10">MyClaw — $20/мес</text>

  <rect x="370" y="560" width="16" height="16" rx="3" fill="#232340" stroke="#FFFFFF20" stroke-width="1"/>
  <text x="394" y="573" fill="#ACA994" font-size="10">Blink Claw — $45/мес</text>

  <rect x="530" y="560" width="16" height="16" rx="3" fill="#232340" stroke="#FFFFFF20" stroke-width="1"/>
  <text x="554" y="573" fill="#ACA994" font-size="10">Self-Host (Hermes Agent) — $5-20/мес VPS</text>

  <rect x="800" y="560" width="16" height="16" rx="3" fill="url(#greenGrad)"/>
  <text x="824" y="573" fill="#ACA994" font-size="10">Open Source (MIT)</text>

  <!-- Bottom tagline -->
  <text x="480" y="602" text-anchor="middle" fill="#6B7280" font-size="9">PaioClaw = Managed OpenClaw/Hermes Agent Platform  •  paio claw.ai  •  @PaioClaw on X</text>
</svg>
