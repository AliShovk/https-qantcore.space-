  <rect x="190" y="218" width="130" height="35" rx="5" fill="#2A2A40" stroke="#FFFFFF08" stroke-width="1"/>
  <text x="255" y="240" text-anchor="middle" fill="#ACA994" font-size="9" font-weight="600">Memory Tiers</text>

  <rect x="335" y="218" width="120" height="35" rx="5" fill="#2A2A40" stroke="#FFFFFF08" stroke-width="1"/>
  <text x="395" y="240" text-anchor="middle" fill="#ACA994" font-size="9" font-weight="600">Personas</text>

  <rect x="470" y="218" width="130" height="35" rx="5" fill="#2A2A40" stroke="#FFFFFF08" stroke-width="1"/>
  <text x="535" y="240" text-anchor="middle" fill="#ACA994" font-size="9" font-weight="600">Provisioning WS</text>

  <rect x="615" y="218" width="120" height="35" rx="5" fill="#2A2A40" stroke="#FFFFFF08" stroke-width="1"/>
  <text x="675" y="240" text-anchor="middle" fill="#ACA994" font-size="9" font-weight="600">Relay Extension</text>

