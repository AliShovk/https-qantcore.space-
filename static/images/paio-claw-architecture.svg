  <text x="560" y="372" text-anchor="middle" fill="#6B7280" font-size="8">user-3 • pro</text>

  <rect x="640" y="335" width="115" height="50" rx="6" fill="#1A2740" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="697" y="355" text-anchor="middle" fill="#93C5FD" font-size="9" font-weight="700">Agent #N</text>
  <text x="697" y="372" text-anchor="middle" fill="#6B7280" font-size="8">user-n • ...</text>

  <!-- ====== ARROWS L3 -> L4 ====== -->
  <line x1="270" y1="400" x2="270" y2="435" stroke="#3B82F6" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="415" y1="400" x2="415" y2="435" stroke="#3B82F6" stroke-width="1" marker-end="url(#arrowGray)"/>
  <line x1="697" y1="400" x2="697" y2="435" stroke="#3B82F6" stroke-width="1" marker-end="url(#arrowGray)"/>

